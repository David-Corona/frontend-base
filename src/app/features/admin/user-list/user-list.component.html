<div class="p-6">
    <div class="flex justify-between items-center mb-6">
        <div class="text-2xl font-bold text-surface-900 dark:text-surface-0">Users</div>
        <p-button label="New User" icon="pi pi-plus" severity="secondary" />
    </div>

    <p-confirmDialog styleClass="w-96" />

    <div class="card">
        <!-- Filters -->
        <div class="flex flex-wrap gap-4 mb-6">
            <div class="flex flex-col gap-2">
                <label class="text-sm font-medium text-surface-900 dark:text-surface-0">Status</label>
                <p-select
                    [options]="statusOptions"
                    [(ngModel)]="statusFilter"
                    optionLabel="label"
                    optionValue="value"
                    placeholder="All"
                    styleClass="w-40"
                    (onChange)="loadUsers(1)"
                />
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-sm font-medium text-surface-900 dark:text-surface-0">Name</label>
                <input pInputText [(ngModel)]="nameFilter" placeholder="Search by name" class="w-64" (keyup.enter)="loadUsers(1)" />
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-sm font-medium text-surface-900 dark:text-surface-0">Email</label>
                <input pInputText [(ngModel)]="emailFilter" placeholder="Search by email" class="w-64" (keyup.enter)="loadUsers(1)" />
            </div>
            <div class="flex flex-col gap-2 justify-end">
                <p-button label="Search" icon="pi pi-search" (onClick)="loadUsers(1)" />
            </div>
            <div class="flex flex-col gap-2 justify-end">
                <p-button label="Clear" icon="pi pi-times" severity="secondary" outlined (onClick)="clearFilters()" />
            </div>
        </div>

        <!-- Table -->
        <p-table
            [value]="users()"
            [loading]="isLoading()"
            [paginator]="true"
            [rows]="pageSize()"
            [totalRecords]="totalRecords()"
            [lazy]="true"
            [showCurrentPageReport]="true"
            currentPageReportTemplate="Showing {first} to {last} of {totalRecords} users"
            [rowsPerPageOptions]="[10, 25, 50]"
            [tableStyle]="{ 'min-width': '60rem' }"
            (onPage)="onPage($event)"
        >
            <ng-template #header>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Created</th>
                    <th style="width: 10rem"></th>
                </tr>
            </ng-template>
            <ng-template #body let-user>
                <tr>
                    <td>
                        <span class="font-medium">{{ user.name || '—' }}</span>
                    </td>
                    <td>{{ user.email }}</td>
                    <td>
                        <p-tag [value]="user.role.name" styleClass="text-xs" />
                    </td>
                    <td>
                        <p-tag
                            [value]="user.isActive ? 'Active' : 'Inactive'"
                            [severity]="user.isActive ? 'success' : 'danger'"
                            styleClass="text-xs"
                        />
                    </td>
                    <td>{{ user.createdAt | date:'mediumDate' }}</td>
                    <td>
                        <div class="flex gap-1">
                            <p-button
                                icon="pi pi-eye"
                                severity="info"
                                size="small"
                                [rounded]="true"
                                [text]="true"
                                (onClick)="viewUser(user)"
                                pTooltip="View user"
                            />
                            @if (user.isActive) {
                                <p-button
                                    icon="pi pi-ban"
                                    severity="danger"
                                    size="small"
                                    [rounded]="true"
                                    [text]="true"
                                    (onClick)="confirmDeactivate(user)"
                                    pTooltip="Deactivate user"
                                />
                            } @else {
                                <p-button
                                    icon="pi pi-check-circle"
                                    severity="success"
                                    size="small"
                                    [rounded]="true"
                                    [text]="true"
                                    (onClick)="confirmActivate(user)"
                                    pTooltip="Activate user"
                                />
                            }
                        </div>
                    </td>
                </tr>
            </ng-template>
            <ng-template #emptymessage>
                <tr>
                    <td colspan="6" class="text-center py-6 text-muted-color">
                        <i class="pi pi-users text-3xl mb-3 block"></i>
                        No users found.
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
