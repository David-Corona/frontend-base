<div class="p-6">
    <div class="text-2xl font-bold text-surface-900 dark:text-surface-0 mb-6">My Profile</div>

    <p-card>
        <div class="flex flex-col gap-6" [formGroup]="profileForm">
            <!-- Name -->
            <div class="flex flex-col gap-2">
                <label for="name" class="font-semibold text-surface-900 dark:text-surface-0">Name</label>
                @if (isEditing()) {
                    <input pInputText id="name" formControlName="name" class="w-full md:w-96" placeholder="Your name" />
                    @if (profileForm.get('name')?.invalid && profileForm.get('name')?.touched) {
                        <small class="text-red-500">Name is required.</small>
                    }
                } @else {
                    <span class="text-surface-700 dark:text-surface-200">{{ currentUser()?.name || '—' }}</span>
                }
            </div>

            <!-- Email -->
            <div class="flex flex-col gap-2">
                <label class="font-semibold text-surface-900 dark:text-surface-0">Email</label>
                <span class="text-surface-700 dark:text-surface-200">{{ currentUser()?.email }}</span>
            </div>

            <!-- Role -->
            <div class="flex flex-col gap-2">
                <label class="font-semibold text-surface-900 dark:text-surface-0">Role</label>
                <div>
                    <p-tag [value]="currentUser()?.role?.name || '—'" styleClass="text-sm"></p-tag>
                </div>
            </div>
        </div>

        <ng-template #footer>
            <div class="flex gap-2">
                @if (isEditing()) {
                    <p-button label="Save" icon="pi pi-check" (onClick)="onSave()" [loading]="isSaving()" [disabled]="isSaving()"></p-button>
                    <p-button label="Cancel" icon="pi pi-times" severity="secondary" (onClick)="onCancel()" [disabled]="isSaving()"></p-button>
                } @else {
                    <p-button label="Edit" icon="pi pi-pencil" (onClick)="startEditing()"></p-button>
                }
            </div>
        </ng-template>
    </p-card>
</div>
