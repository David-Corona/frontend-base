<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-col items-center justify-center">
        <div style="border-radius: 56px; padding: 0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%)">
            <div class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20" style="border-radius: 53px">
                <div class="text-center mb-8">
                    <div class="mb-8 w-16 h-16 shrink-0 mx-auto bg-primary rounded-full flex items-center justify-center">
                        <i class="pi pi-lock text-white text-3xl"></i>
                    </div>
                    <div class="text-surface-900 dark:text-surface-0 text-3xl font-medium mb-4">Forgot Password</div>
                    <span class="text-muted-color font-medium">Reset your password</span>
                </div>

                @if (!isSubmitted()) {
                    @if (errorMessage()) {
                        <div class="mb-4">
                            <p-message severity="error" [text]="errorMessage()!"></p-message>
                        </div>
                    }

                    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
                        <div class="mb-6">
                            <label for="email" class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">Email</label>
                            <input pInputText id="email" type="email" placeholder="Email address" class="w-full md:w-120" formControlName="email" />
                            @if (forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched) {
                                <small class="block text-red-500 mt-1">Valid email is required.</small>
                            }
                        </div>

                        <p-button type="submit" label="Send Reset Link" styleClass="w-full" [loading]="isLoading()" [disabled]="isLoading()"></p-button>
                    </form>

                    <div class="mt-6 text-center">
                        <span class="text-muted-color">Remember your password? </span>
                        <a class="font-medium text-primary cursor-pointer" routerLink="/auth/login">Sign in</a>
                    </div>
                } @else {
                    <div class="mb-4">
                        <p-message severity="success" text="If an account with that email exists, we've sent a password reset link. Please check your inbox."></p-message>
                    </div>

                    <div class="mt-6 text-center">
                        <p-button label="Back to Login" styleClass="w-full" routerLink="/auth/login"></p-button>
                    </div>
                }
            </div>
        </div>
    </div>
</div>
